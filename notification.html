<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifikasi - FahriXZ Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animation.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/logo.svg">
  <style>
    .notif-container { padding: 20px; max-width: 700px; margin: 0 auto; }
    .notif-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 5px; }
    .notif-header h1 { font-size: 1.3rem; font-weight: 700; }
    .notif-actions { display: flex; gap: 10px; }
    .notif-actions button { padding: 8px 16px; background: var(--bg-glass); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); color: var(--text-primary); font-size: 12px; cursor: pointer; transition: var(--transition-base); }
    .notif-actions button:hover { background: var(--primary); color: var(--text-inverse); }
    .notif-item { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 10px; display: flex; gap: 15px; align-items: flex-start; transition: var(--transition-base); position: relative; }
    .notif-item:hover { border-color: var(--border-medium); }
    .notif-item.unread { border-left: 3px solid var(--primary); }
    .notif-item.read { opacity: 0.7; }
    .notif-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-glass); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .notif-content { flex: 1; }
    .notif-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .notif-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    .notif-time { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
    .notif-delete { position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border-radius: 50%; background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition-base); opacity: 0; }
    .notif-item:hover .notif-delete { opacity: 1; }
    .notif-delete:hover { background: var(--error); color: white; }
    .notif-item.read .notif-delete { opacity: 1; }
    .notif-badge-counter { display: inline-flex; align-items: center; padding: 2px 10px; background: var(--primary); color: var(--text-inverse); border-radius: var(--radius-full); font-size: 11px; font-weight: 700; margin-left: 8px; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar glass-nav">
    <div class="navbar-brand">
      <button onclick="history.back()" style="background:none;border:none;color:var(--text-primary);margin-right:10px;cursor:pointer">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <h1>Notifikasi <span class="notif-badge-counter" id="unreadBadge" style="display:none">0</span></h1>
    </div>
    <div class="nav-icons">
      <button class="nav-icon-btn" onclick="markAllRead()" title="Tandai semua dibaca">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </button>
    </div>
  </nav>

  <!-- Notification Container -->
  <div class="notif-container">
    <div class="notif-header">
      <div style="display:flex;align-items:center;gap:10px">
        <h1>Semua Notifikasi</h1>
      </div>
      <div class="notif-actions">
        <button onclick="markAllRead()">✓ Tandai dibaca</button>
        <button onclick="clearReadNotifications()">🗑 Hapus dibaca</button>
      </div>
    </div>

    <div id="notificationList">
      <!-- Loading skeleton -->
      <div class="skeleton" style="padding:20px;margin-bottom:10px;height:80px"></div>
      <div class="skeleton" style="padding:20px;margin-bottom:10px;height:80px"></div>
      <div class="skeleton" style="padding:20px;margin-bottom:10px;height:80px"></div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display:none;padding:60px 20px">
      <div class="icon">🔔</div>
      <h3>Belum ada notifikasi</h3>
      <p>Notifikasi dari admin akan muncul di sini</p>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove, push, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

    // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDjSUSuUWl6GOh_vJ-GnYV1tvguv0_pRXI",
    authDomain: "fahrixzstore.firebaseapp.com",
    databaseURL: "https://fahrixzstore-default-rtdb.firebaseio.com",
    projectId: "fahrixzstore",
    storageBucket: "fahrixzstore.firebasestorage.app",
    messagingSenderId: "1070736619563",
    appId: "1:1070736619563:web:735cdd57d5c90373e1526e",
    measurementId: "G-H7QL79SSMX"
    };

    let notificationsData = {};
    let userReadNotifications = JSON.parse(localStorage.getItem('readNotifications') || '[]');

    try {
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // Listen for notifications from admin
      const notifRef = ref(db, "notifications");
      onValue(notifRef, (snapshot) => {
        const listEl = document.getElementById('notificationList');

        if (!snapshot.exists()) {
          listEl.innerHTML = '';
          document.getElementById('emptyState').style.display = 'block';
          updateBadge(0);
          return;
        }

        document.getElementById('emptyState').style.display = 'none';
        notificationsData = snapshot.val();
        renderNotifications();
      }, (error) => {
        console.error("Error:", error);
        document.getElementById('notificationList').innerHTML = `
          <div class="empty-state" style="padding:60px 20px">
            <div class="icon">⚠️</div>
            <h3>Gagal memuat notifikasi</h3>
            <p>Silakan refresh halaman</p>
          </div>`;
      });

      function renderNotifications() {
        const listEl = document.getElementById('notificationList');
        const entries = Object.entries(notificationsData).sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));

        if (entries.length === 0) {
          listEl.innerHTML = '';
          document.getElementById('emptyState').style.display = 'block';
          updateBadge(0);
          return;
        }

        document.getElementById('emptyState').style.display = 'none';

        let unreadCount = 0;
        listEl.innerHTML = entries.map(([id, notif]) => {
          const isRead = userReadNotifications.includes(id);
          if (!isRead) unreadCount++;
          const date = notif.date || new Date(notif.timestamp).toLocaleDateString('id-ID') || '';

          return `
            <div class="notif-item ${isRead ? 'read' : 'unread'}" data-id="${id}">
              <div class="notif-icon">${notif.icon || '🔔'}</div>
              <div class="notif-content">
                <div class="notif-title">${escapeHtml(notif.title || 'Notifikasi')}</div>
                <div class="notif-desc">${escapeHtml(notif.description || '-')}</div>
                <div class="notif-time">${date}</div>
              </div>
              ${isRead ? `<button class="notif-delete" onclick="deleteNotification('${id}')" title="Hapus">✕</button>` : ''}
            </div>
          `;
        }).join('');

        // Click to mark as read
        document.querySelectorAll('.notif-item.unread').forEach(item => {
          item.addEventListener('click', function() {
            const id = this.dataset.id;
            if (!userReadNotifications.includes(id)) {
              userReadNotifications.push(id);
              localStorage.setItem('readNotifications', JSON.stringify(userReadNotifications));
              this.classList.remove('unread');
              this.classList.add('read');
              renderNotifications();
            }
          });
        });

        updateBadge(unreadCount);
      }

      function updateBadge(count) {
        const badge = document.getElementById('unreadBadge');
        if (badge) {
          badge.textContent = count;
          badge.style.display = count > 0 ? 'inline-flex' : 'none';
        }
        // Update navbar badge in other pages via localStorage
        localStorage.setItem('unreadNotifCount', count);
      }

      window.markAllRead = function() {
        Object.keys(notificationsData).forEach(id => {
          if (!userReadNotifications.includes(id)) {
            userReadNotifications.push(id);
          }
        });
        localStorage.setItem('readNotifications', JSON.stringify(userReadNotifications));
        renderNotifications();
        showToast('Semua notifikasi ditandai dibaca', 'success');
      };

      window.deleteNotification = function(id) {
        // Remove from read list
        userReadNotifications = userReadNotifications.filter(rid => rid !== id);
        localStorage.setItem('readNotifications', JSON.stringify(userReadNotifications));

        // Remove from Firebase if user has permission, or just hide locally
        const item = document.querySelector(`.notif-item[data-id="${id}"]`);
        if (item) {
          item.style.opacity = '0';
          item.style.transform = 'translateX(100px)';
          setTimeout(() => {
            delete notificationsData[id];
            renderNotifications();
          }, 300);
        }
        showToast('Notifikasi dihapus', 'success');
      };

      window.clearReadNotifications = function() {
        const readItems = document.querySelectorAll('.notif-item.read');
        if (readItems.length === 0) {
          showToast('Tidak ada notifikasi yang sudah dibaca', 'info');
          return;
        }
        readItems.forEach(item => {
          const id = item.dataset.id;
          delete notificationsData[id];
          item.remove();
        });
        renderNotifications();
        showToast(`${readItems.length} notifikasi dibaca telah dihapus`, 'success');
      };

    } catch (error) {
      console.error("Firebase error:", error);
      document.getElementById('notificationList').innerHTML = `
        <div class="empty-state" style="padding:60px 20px">
          <div class="icon">🔔</div>
          <h3>Belum ada notifikasi</h3>
          <p>Notifikasi akan muncul saat admin mengirimkan</p>
        </div>`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('pwa/sw.js').then(r => console.log('SW registered')).catch(e => console.log('SW failed'));
    }
  </script>
</body>
</html>
