  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <style>
    body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: #f3f6ff; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .order-popup { width: 100%; max-width: 400px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .popup-header { background: linear-gradient(135deg, #00d9ff, #667eea); padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; }
    .popup-header h2 { margin: 0; color: #000; font-size: 18px; font-weight: 700; }
    .close-btn { border: none; background: none; font-size: 24px; cursor: pointer; font-weight: bold; color: #000; }
    .order-detail { padding: 25px; color: #111; font-size: 16px; }
    .order-detail .row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
    .order-detail .row span:first-child { font-weight: 600; color: #666; min-width: 80px; }
    .order-detail .row span:last-child { font-weight: 700; color: #000; }
    .btn-order { width: 90%; margin: 0 auto 20px; display: block; padding: 16px; background: linear-gradient(135deg, #00d9ff, #667eea); border: none; color: #000; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 12px; }
  </style>

<body>
  <div class="order-popup">
    <div class="popup-header">
      <h2>ORDER</h2>
      <button class="close-btn" onclick="window.close()">✕</button>
    </div>
    <div class="order-detail">
      <div class="row"><span>produk</span><span id="produk">: Dana (contoh)</span></div>
      <div class="row"><span>harga</span><span id="harga">: Rp***** (Contoh)</span></div>
      <div class="row"><span>quantity</span><span id="quantity">: x1</span></div>
      <div class="row"><span>ID</span><span id="orderId">: FXZSTR-ID2210***** (CONTOH</span></div>
    </div>
    <button class="btn-order" onclick="createOrder()">Buat Pesanan</button>
  </div>

  <script>
    // Get URL parameters
    const params = new URLSearchParams(window.location.search);
    const productName = params.get('product') || 'Dana (contoh)';
    const productPrice = params.get('price') || 'Rp*****';

    document.getElementById('produk').textContent = ': ' + productName;
    document.getElementById('harga').textContent = ': ' + productPrice;

    function createOrder() {
      alert('Pesanan akan diproses!');
    }
  </script>
