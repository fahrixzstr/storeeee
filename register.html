<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - FahriXZ Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/logo.svg">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: var(--gradient-dark); position: relative; overflow: hidden; }
    .auth-page::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 70% 50%, rgba(102,126,234,0.06), transparent 50%); }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border-accent); border-radius: var(--radius-2xl); padding: 40px; width: 100%; max-width: 420px; position: relative; z-index: 2; box-shadow: var(--shadow-lg); }
    .auth-logo { text-align: center; margin-bottom: 30px; }
    .auth-logo h1 { font-size: 2rem; font-weight: 800; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .auth-logo p { font-size: 13px; color: var(--text-secondary); margin-top: 5px; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
    .input-group input { width: 100%; padding: 14px 16px; background: var(--bg-glass); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); color: var(--text-primary); font-size: 14px; transition: var(--transition-base); }
    .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,217,255,0.1); }
    .input-group input::placeholder { color: var(--text-muted); }
    .btn-primary-full { width: 100%; padding: 14px; background: var(--gradient-primary); border: none; border-radius: var(--radius-md); color: var(--text-inverse); font-weight: 700; font-size: 14px; cursor: pointer; transition: var(--transition-base); margin-bottom: 12px; }
    .btn-primary-full:hover { transform: scale(1.01); box-shadow: var(--shadow-glow); }
    .btn-google { width: 100%; padding: 12px; background: var(--bg-glass); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); color: var(--text-primary); font-weight: 600; font-size: 14px; cursor: pointer; transition: var(--transition-base); display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-google:hover { background: var(--bg-glass-hover); border-color: var(--border-medium); }
    .auth-divider { display: flex; align-items: center; gap: 16px; margin: 20px 0; color: var(--text-muted); font-size: 12px; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border-subtle); }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-secondary); }
    .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .back-link { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 13px; margin-bottom: 20px; cursor: pointer; transition: var(--transition-fast); }
    .back-link:hover { color: var(--primary); }
  </style>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Kembali
      </a>

      <div class="auth-logo">
        <h1>FahriXZ</h1>
        <p>Buat akun baru</p>
      </div>

      <form id="registerForm">
        <div class="input-group">
          <label>Nama Lengkap</label>
          <input type="text" id="registerName" placeholder="Nama Anda" required autocomplete="name">
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="registerEmail" placeholder="email@example.com" required autocomplete="email">
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="registerPassword" placeholder="Minimal 6 karakter" required autocomplete="new-password" minlength="6">
        </div>

        <div class="input-group">
          <label>Nomor WhatsApp</label>
          <input type="tel" id="registerWhatsapp" placeholder="62812xxxxxxx" required autocomplete="tel">
        </div>

        <button type="submit" class="btn-primary-full">Daftar</button>
      </form>

      <div class="auth-divider">atau</div>

      <button class="btn-google" onclick="googleLogin()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M5.27 9.76C5.27 5.91 8.44 3 12.24 3c2.09 0 3.95.9 5.27 2.58l-2.47 2.47C13.68 6.44 12.95 5.72 12.24 5.72c-2.65 0-4.81 2.15-4.81 4.78 0 2.62 2.16 4.78 4.81 4.78 1.43 0 2.68-.52 3.62-1.44l2.41 2.41c-1.22.94-2.8 1.52-4.53 1.52-3.65-.04-6.6-2.96-6.6-6.59z"/><path fill="#34A853" d="M16.04 18.01l-2.41-2.41c-.56.67-1.43 1.09-2.4 1.09-1.85 0-3.41-1.26-3.92-2.96H7.34v3.09c2.72 1.95 6.82 2.81 10.87 2.31z"/><path fill="#FBBC05" d="M12.24 20.24c2.02-.2 3.79-1.12 4.85-2.53l2.58-2.58c-.92-1.9-2.4-3.43-4.43-4.03l-3.09 3.09c.64.76 1.03 1.76 1.03 2.88 0 .17-.01.34-.02.51l.08.36z"/><path fill="#4285F4" d="M16.04 14.58l3-3.09c-.56-1.2-1.49-2.17-2.76-2.58l-3.09 3.09c1.02.38 1.87 1.07 2.47 2.03l.38-.03z"/></svg>
        Daftar dengan Google
      </button>

      <div class="auth-footer">
        <p>Sudah punya akun? <a href="login.html">Masuk</a></p>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

// Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDjSUSuUWl6GOh_vJ-GnYV1tvguv0_pRXI",
    authDomain: "fahrixzstore.firebaseapp.com",
    databaseURL: "https://fahrixzstore-default-rtdb.firebaseio.com",
    projectId: "fahrixzstore",
    storageBucket: "fahrixzstore.firebasestorage.app",
    messagingSenderId: "1070736619563",
    appId: "1:1070736619563:web:735cdd57d5c90373e1526e",
    measurementId: "G-H7QL79SSMX"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Check referral from URL
    const urlParams = new URLSearchParams(window.location.search);
    const refCode = urlParams.get('ref');
    if (refCode) localStorage.setItem('referrerCode', refCode);

    // Register Form
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const whatsapp = document.getElementById('registerWhatsapp').value;

      if (password.length < 6) {
        showToast('Password minimal 6 karakter!', 'error');
        return;
      }

      if (!whatsapp.startsWith('62')) {
        showToast('Nomor WhatsApp harus diawali dengan 62!', 'error');
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(userCredential.user, { displayName: name });

        // Save to Firestore
        await setDoc(doc(db, 'users', userCredential.user.uid), {
  uid: userCredential.user.uid,
  name: name,
  email: email,
  whatsapp: whatsapp,

  role: "user",

  saldo: 0,
  orderCount: 0,

  referralCode: 'FXZ' + Math.random().toString(36).substring(2, 8).toUpperCase(),
  referralCount: 0,
  referralEarning: 0,

  referredBy: localStorage.getItem('referrerCode') || null,

  isActive: true,

  createdAt: serverTimestamp()
});

        showToast('Pendaftaran berhasil! Selamat datang', 'success');
        setTimeout(() => location.href = 'index.html', 1200);
      } catch (error) {
        showToast('Pendaftaran gagal: ' + error.message, 'error');
      }
    });

    // Google Register
    window.googleLogin = async function() {
      try {
        await signInWithPopup(auth, provider);
        showToast('Daftar dengan Google berhasil!', 'success');
        setTimeout(() => location.href = 'index.html', 1200);
      } catch (error) {
        showToast('Daftar Google gagal: ' + error.message, 'error');
      }
    };
  </script>
</body>
</html>
