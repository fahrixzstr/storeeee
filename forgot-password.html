<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password - FahriXZ Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/logo.svg">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: var(--gradient-dark); }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border-accent); border-radius: var(--radius-2xl); padding: 40px; width: 100%; max-width: 420px; }
    .auth-logo { text-align: center; margin-bottom: 30px; }
    .auth-logo h1 { font-size: 2rem; font-weight: 800; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
    .input-group input { width: 100%; padding: 14px 16px; background: var(--bg-glass); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); color: var(--text-primary); font-size: 14px; }
    .btn-primary-full { width: 100%; padding: 14px; background: var(--gradient-primary); border: none; border-radius: var(--radius-md); color: var(--text-inverse); font-weight: 700; font-size: 14px; cursor: pointer; }
    .back-link { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 13px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="login.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Kembali
      </a>
      <div class="auth-logo">
        <h1>FahriXZ</h1>
        <p style="font-size:13px;color:var(--text-secondary)">Reset password Anda</p>
      </div>
      <form id="resetForm">
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="resetEmail" placeholder="email@example.com" required>
        </div>
        <button type="submit" class="btn-primary-full">Kirim Link Reset</button>
      </form>
      <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-secondary)">Ingat password? <a href="login.html" style="color:var(--primary);text-decoration:none;font-weight:600">Masuk</a></p>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="js/app.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    const app = initializeApp({ apiKey: "AIzaSyDjSUSuUWl6GOh_vJ-GnYV1tvguv0_pRXI", authDomain: "fahrixzstore.firebaseapp.com", projectId: "fahrixzstore" });
    const auth = getAuth(app);
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await sendPasswordResetEmail(auth, document.getElementById('resetEmail').value);
        showToast('Link reset password telah dikirim!', 'success');
      } catch (error) { showToast('Gagal: ' + error.message, 'error'); }
    });
  </script>
</body>
</html>
